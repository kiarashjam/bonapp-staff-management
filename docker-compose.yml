version: '3.8'

services:
  # ── SQL Server ──
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: staffpro-db
    environment:
      SA_PASSWORD: "StaffPro2026!"
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "StaffPro2026!" -Q "SELECT 1" -C -b
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ──
  redis:
    image: redis:7-alpine
    container_name: staffpro-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  # ── Backend API ──
  api:
    build:
      context: ./staff-backend
      dockerfile: Dockerfile
    container_name: staffpro-api
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:5000
      - ConnectionStrings__DefaultConnection=Server=sqlserver,1433;Database=StaffProDb;User Id=sa;Password=StaffPro2026!;TrustServerCertificate=True
      - Redis__ConnectionString=redis:6379
    ports:
      - "5000:5000"
    depends_on:
      sqlserver:
        condition: service_healthy
      redis:
        condition: service_started

  # ── Frontend ──
  frontend:
    build:
      context: ./staff-frontend
      dockerfile: Dockerfile
    container_name: staffpro-frontend
    ports:
      - "5173:80"
    depends_on:
      - api

volumes:
  sqlserver-data:
  redis-data:
